<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${country.commonName} + ' — WorldScope'">WorldScope</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back {
            color: #60a5fa;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: gap 0.2s;
        }

        .back:hover { gap: 10px; }

        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-left: auto;
        }

        main {
            max-width: 800px;
            margin: 48px auto;
            padding: 0 24px;
        }

        .hero {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .flag-wrapper {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid #334155;
            flex-shrink: 0;
        }

        .flag-wrapper img {
            width: 280px;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .hero-info { flex: 1; min-width: 200px; }

        .country-name {
            font-size: 40px;
            font-weight: 800;
            color: #f1f5f9;
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .region-badge {
            display: inline-block;
            padding: 4px 12px;
            background: linear-gradient(135deg, #1d4ed8, #7c3aed);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: white;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }

        .info-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            transition: border-color 0.2s;
        }

        .info-card:hover { border-color: #60a5fa; }

        .info-icon { font-size: 24px; margin-bottom: 8px; }

        .info-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 18px;
            font-weight: 700;
            color: #f1f5f9;
        }

        .error {
            background: #450a0a;
            border: 1px solid #991b1b;
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<header>
    <a class="back" href="/">← Retour à la liste</a>
    <span class="logo">🌍 WorldScope</span>
</header>

<main>
    <p th:if="${error}" class="error" th:text="${error}"></p>

    <div th:if="${country}">
        <div class="hero">
            <div class="flag-wrapper">
                <img th:src="${country.flagUrl}"
                     th:alt="${country.commonName}"
                     onerror="this.src='https://placehold.co/280x180/1e293b/475569?text=No+Flag'" />
            </div>
            <div class="hero-info">
                <h1 class="country-name" th:text="${country.commonName}"></h1>
                <span class="region-badge" th:text="${country.region}"></span>
                <div class="grid">
                    <div class="info-card">
                        <div class="info-icon">🏛️</div>
                        <div class="info-label">Capitale</div>
                        <div class="info-value" th:text="${country.capitalName}"></div>
                    </div>
                    <div class="info-card">
                        <div class="info-icon">👥</div>
                        <div class="info-label">Population</div>
                        <div class="info-value"
                             th:text="${#numbers.formatInteger(country.population, 3, 'COMMA')}">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
